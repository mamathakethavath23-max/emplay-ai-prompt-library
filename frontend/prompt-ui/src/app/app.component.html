<div class="navbar">
  <h2>AI Prompt Library</h2>
</div>

<div class="container">

  <div class="card" *ngFor="let prompt of prompts; let i = index">
    <h2>{{ prompt.title }}</h2>
    <p>Complexity: {{ prompt.complexity }}/10</p>
    <button class="delete-btn" (click)="deletePrompt(i)">Delete</button>
  </div>

  <div class="form-box">
    <h2>Add New Prompt</h2>

    <input type="text" placeholder="Prompt Title" [(ngModel)]="newTitle">

    <textarea rows="5" placeholder="Prompt Content" [(ngModel)]="newContent"></textarea>

    <input type="number" min="1" max="10" [(ngModel)]="newComplexity">

    <p class="error" *ngIf="error">{{ error }}</p>

    <button (click)="addPrompt()">Add Prompt</button>
  </div>

</div>
